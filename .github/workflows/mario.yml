name: Generate Mario contribution animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create output directory
        run: mkdir -p output

      - name: Generate SVG
        run: node scripts/generate.mjs "${{ github.repository_owner }}" output/mario.svg

      - name: Generate dark-mode variant (optional, same data)
        run: node scripts/generate.mjs "${{ github.repository_owner }}" output/mario-dark.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/mario.svg output/mario-dark.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update mario contribution animation"
          git push
